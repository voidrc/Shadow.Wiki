name: Discord — New Content Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need previous commit to diff

      - name: Collect changed files
        id: changes
        run: |
          # List files added or modified in this push
          FILES=$(git diff --name-status HEAD~1 HEAD \
            | awk '$1 ~ /^[AM]$/ {print $2}' \
            | head -20 \
            | sed 's/^/• /')

          if [ -z "$FILES" ]; then
            FILES="• (no tracked files changed)"
          fi

          # Escape for JSON (newlines → \n)
          FILES_JSON=$(echo "$FILES" | awk '{printf "%s\\n", $0}')
          echo "files=$FILES_JSON" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_URL="${REPO_URL}/commit/${COMMIT_SHA}"

          # Truncate commit message to first line
          TITLE=$(echo "$COMMIT_MSG" | head -1 | cut -c1-100)

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "📚 New Content — Shadow.Lab",
              "url": "${COMMIT_URL}",
              "color": 5793266,
              "fields": [
                {
                  "name": "✏️ Commit",
                  "value": "[\`${SHORT_SHA}\`](${COMMIT_URL}) ${TITLE}",
                  "inline": false
                },
                {
                  "name": "👤 Author",
                  "value": "${COMMIT_AUTHOR}",
                  "inline": true
                },
                {
                  "name": "🌿 Branch",
                  "value": "main",
                  "inline": true
                },
                {
                  "name": "📂 Changed Files",
                  "value": "${CHANGED_FILES}",
                  "inline": false
                }
              ],
              "footer": {
                "text": "Shadow.Lab",
                "icon_url": "https://github.githubassets.com/favicons/favicon.png"
              },
              "author": {
                "name": "📖 Browse the Knowledge Base",
                "url": "https://github.com/voidrc/Shadow.Lab"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          curl -fsSL \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
